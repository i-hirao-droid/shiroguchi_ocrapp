<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
    .container { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; max-width: 960px; width: 100%; align-self: flex-start; }
    h1 { font-size: 20px; margin-bottom: 24px; color: #1a73e8; }
    h3 { margin: 0 0 8px; font-size: 15px; color: #1a73e8; }
    .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 16px; }
    .upload-area:hover, .upload-area.dragover { border-color: #1a73e8; background: #e8f0fe; }
    .upload-area p { color: #666; font-size: 14px; }
    .file-name { font-size: 14px; color: #333; margin-bottom: 16px; display: none; }
    .file-name span { font-weight: bold; }
    button { background: #1a73e8; color: #fff; border: none; border-radius: 6px; padding: 12px 32px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1557b0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
    button.secondary:hover { background: #e8f0fe; }
    button.danger { background: #fff; color: #c5221f; border: 1px solid #c5221f; padding: 4px 10px; font-size: 12px; }
    button.danger:hover { background: #fce8e6; }
    button.full { width: 100%; }
    .status { margin-top: 20px; padding: 12px 16px; border-radius: 6px; font-size: 14px; display: none; }
    .status.processing { background: #e8f0fe; color: #1a73e8; display: block; }
    .status.success { background: #e6f4ea; color: #137333; display: block; }
    .status.error { background: #fce8e6; color: #c5221f; display: block; }
    #progressWrap { display: none; margin-top: 12px; }
    #progressBar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    #progressFill { height: 100%; width: 0%; background: #1a73e8; transition: width 0.3s; border-radius: 4px; }
    #progressLabel { font-size: 12px; color: #666; margin-top: 4px; }
    .result { margin-top: 20px; display: none; }
    .result table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
    .result th, .result td { border: 1px solid #e0e0e0; padding: 6px 8px; text-align: left; vertical-align: middle; }
    .result th { background: #f8f9fa; font-weight: 600; }
    .basic-info th { width: 30%; }
    .line-items table th { background: #e8f0fe; text-align: center; font-size: 12px; }
    .line-items td { padding: 4px 6px; }
    .result input, .result select { width: 100%; border: 1px solid transparent; background: transparent; padding: 6px 8px; font-size: 13px; font-family: inherit; color: #333; border-radius: 4px; }
    .result input:hover, .result select:hover { border-color: #dadce0; }
    .result input:focus, .result select:focus { border-color: #1a73e8; outline: none; background: #fff; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
    .result input[type="number"] { text-align: right; }
    .result .col-delete { width: 48px; text-align: center; padding: 4px; }
    .result .col-no { width: 44px; text-align: center; color: #666; font-size: 12px; background: #fafafa; }
    .result .summary td:nth-child(2), .result .summary td:nth-child(3) { text-align: right; }
    .action-bar { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
    .action-bar button { flex: 1; min-width: 180px; }
    .spreadsheet-link { margin-top: 16px; padding: 14px; background: #e6f4ea; border-radius: 6px; text-align: center; display: none; }
    .spreadsheet-link a { color: #137333; font-weight: bold; text-decoration: none; font-size: 15px; }
    .spreadsheet-link a:hover { text-decoration: underline; }
    input[type="file"] { display: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #1a73e8; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>請求書OCRアプリ</h1>

    <div class="upload-area" id="uploadArea">
      <p>PDFファイルをドラッグ&ドロップ<br>またはクリックして選択</p>
    </div>
    <input type="file" id="fileInput" accept="application/pdf">
    <div class="file-name" id="fileName">選択中: <span id="fileNameText"></span></div>

    <button id="submitBtn" class="full" disabled onclick="handleSubmit()">OCR処理を実行</button>

    <div class="status" id="status"></div>
    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="progressLabel"></div>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var selectedFile = null;
    var MAX_SIZE = 10 * 1024 * 1024;
    var currentData = null;
    var currentFileName = null;

    var uploadArea = document.getElementById('uploadArea');
    var fileInput = document.getElementById('fileInput');

    uploadArea.addEventListener('click', function() { fileInput.click(); });
    uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
    uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', function() { if (fileInput.files.length > 0) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      if (file.type !== 'application/pdf') { showStatus('PDFファイルを選択してください。', 'error'); return; }
      if (file.size > MAX_SIZE) { showStatus('ファイルサイズが10MBを超えています。', 'error'); return; }
      selectedFile = file;
      document.getElementById('fileNameText').textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
      document.getElementById('fileName').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('result').style.display = 'none';
      hideStatus();
    }

    async function pdfToPageImages(file) {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      var images = [];
      for (var pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        var page = await pdf.getPage(pageNum);
        var viewport = page.getViewport({ scale: 1.5 });
        var canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
        images.push({ data: canvas.toDataURL('image/jpeg', 0.85), mimeType: 'image/jpeg' });
      }
      return images;
    }

    function mergePageResults(pageResults) {
      var merged = { invoice_number: null, issue_date: null, due_date: null, sender_name: null, recipient_name: null, delivery_destination: null, subtotal: null, tax_rate: null, tax_amount: null, total_amount: null, line_items: [] };
      pageResults.forEach(function(r) {
        if (!merged.invoice_number && r.invoice_number) merged.invoice_number = r.invoice_number;
        if (!merged.issue_date && r.issue_date) merged.issue_date = r.issue_date;
        if (!merged.due_date && r.due_date) merged.due_date = r.due_date;
        if (!merged.sender_name && r.sender_name) merged.sender_name = r.sender_name;
        if (!merged.recipient_name && r.recipient_name) merged.recipient_name = r.recipient_name;
        if (!merged.delivery_destination && r.delivery_destination) merged.delivery_destination = r.delivery_destination;
        if (r.subtotal != null) merged.subtotal = r.subtotal;
        if (r.tax_rate != null) merged.tax_rate = r.tax_rate;
        if (r.tax_amount != null) merged.tax_amount = r.tax_amount;
        if (r.total_amount != null) merged.total_amount = r.total_amount;
        if (r.line_items && r.line_items.length > 0) merged.line_items = merged.line_items.concat(r.line_items);
      });
      return merged;
    }

    // 実予記号の正規化。A-Z 1文字以外は空文字（＝継承対象）
    function normalizeJitsuyoKigo(raw) {
      var kigo = raw != null ? String(raw).trim() : '';
      if (kigo === '') return '';
      kigo = kigo.replace(/丁/g, 'J');
      kigo = kigo.replace(/[Ａ-Ｚ]/g, function(ch) { return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0); });
      kigo = kigo.toUpperCase();
      return /^[A-Z]$/.test(kigo) ? kigo : '';
    }

    // OCR直後のみ適用：空欄（継承対象）→ 直前の有効記号を引き継ぐ
    function propagateJitsuyoKigo(items) {
      var lastSymbol = null;
      items.forEach(function(item) {
        var kigo = normalizeJitsuyoKigo(item.jitsuyo_kigo);
        if (kigo !== '') {
          lastSymbol = kigo;
          item.jitsuyo_kigo = kigo;
        } else if (lastSymbol) {
          item.jitsuyo_kigo = lastSymbol;
        } else {
          item.jitsuyo_kigo = '';
        }
      });
    }

    async function handleSubmit() {
      if (!selectedFile) return;
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      var progressWrap = document.getElementById('progressWrap');
      var progressFill = document.getElementById('progressFill');
      var progressLabel = document.getElementById('progressLabel');
      document.getElementById('result').style.display = 'none';

      showStatus('<span class="spinner"></span>PDFをJPEG画像に変換中...', 'processing');
      progressWrap.style.display = 'block';
      progressFill.style.width = '0%';

      try {
        var pageImages = await pdfToPageImages(selectedFile);
        var totalPages = pageImages.length;
        progressFill.style.width = '10%';
        progressLabel.textContent = totalPages + 'ページをJPEGに変換完了';

        var pageResults = [];
        var failedPages = [];
        var emptyPages = [];
        for (var i = 0; i < totalPages; i++) {
          progressFill.style.width = (10 + Math.round((i / totalPages) * 85)) + '%';
          progressLabel.textContent = 'ページ ' + (i + 1) + ' / ' + totalPages + ' をAI解析中...';
          showStatus('<span class="spinner"></span>Gemini APIでOCR処理中（' + (i + 1) + '/' + totalPages + 'ページ）...', 'processing');

          var rawResult = await new Promise(function(resolve) {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(function(err) { resolve(JSON.stringify({ line_items: [], error: String(err) })); })
              .processOnePage(pageImages[i], i + 1, totalPages);
          });

          var parsed;
          try {
            parsed = JSON.parse(rawResult);
          } catch (e) {
            parsed = { line_items: [], error: 'レスポンスのパースに失敗: ' + e.message };
          }
          pageResults.push(parsed);
          if (parsed.error) {
            failedPages.push({ page: i + 1, message: parsed.error });
          } else if (!parsed.line_items || parsed.line_items.length === 0) {
            emptyPages.push(i + 1);
          }
        }

        var mergedData = mergePageResults(pageResults);
        propagateJitsuyoKigo(mergedData.line_items);

        progressFill.style.width = '100%';
        progressLabel.textContent = '全' + totalPages + 'ページ処理完了';

        if (failedPages.length > 0) {
          var detail = failedPages.map(function(f) { return 'p.' + f.page + ': ' + f.message; }).join(' / ');
          showStatus('⚠ ' + failedPages.length + 'ページで抽出に失敗しました（' + detail + '）。再実行するか、明細を手入力してください。', 'error');
        } else if (emptyPages.length > 0) {
          showStatus('OCR処理完了。ただし明細0件のページがあります: p.' + emptyPages.join(', p.') + '（空ページなら正常、明細があるページなら再実行を推奨）', 'processing');
        } else {
          showStatus('OCR処理が完了しました。内容を確認・修正して「スプレッドシートに保存」を押してください。', 'success');
        }

        currentData = mergedData;
        currentFileName = selectedFile.name;
        renderEditor();

      } catch (err) {
        showStatus('エラー: ' + esc(err.message || String(err)), 'error');
      } finally {
        btn.disabled = false;
      }
    }

    // 編集可能なプレビューを描画
    function renderEditor() {
      var d = currentData;
      var html = '';

      // 基本情報（編集可能）
      html += '<h3>基本情報（修正できます）</h3>';
      html += '<table class="basic-info">';
      html += infoRow('請求元', 'sender_name', d.sender_name, 'text');
      html += infoRow('請求日', 'issue_date', d.issue_date, 'text');
      html += infoRow('納品先名', 'delivery_destination', d.delivery_destination, 'text');
      html += infoRow('商品合計', 'subtotal', d.subtotal, 'number');
      html += infoRow('消費税', 'tax_amount', d.tax_amount, 'number');
      html += infoRow('総合計', 'total_amount', d.total_amount, 'number');
      html += '</table>';

      // 明細（編集可能）
      html += '<div class="line-items" style="margin-top:20px;"><h3>明細（修正できます）</h3>';
      html += '<table><thead><tr>';
      html += '<th class="col-no">No.</th><th style="width:110px;">納品日</th><th>商品名</th><th style="width:70px;">数量</th><th style="width:90px;">単価</th><th style="width:90px;">実予記号</th><th style="width:110px;">金額</th><th class="col-delete">削除</th>';
      html += '</tr></thead><tbody id="lineItemsBody">';
      (d.line_items || []).forEach(function(item, idx) {
        html += renderLineItemRow(item, idx);
      });
      html += '</tbody></table>';
      html += '<button class="secondary" style="margin-top:8px;padding:8px 16px;font-size:13px;" onclick="addLineItem()">＋ 行を追加</button>';
      html += '</div>';

      // 実予記号集計（自動再計算）
      html += '<div class="line-items" style="margin-top:20px;"><h3>実予記号集計（自動計算）</h3>';
      html += '<table class="summary"><thead><tr><th>実予記号</th><th>合計金額</th><th>明細数</th></tr></thead><tbody id="summaryBody"></tbody></table>';
      html += '</div>';

      // アクションバー
      html += '<div class="action-bar">';
      html += '<button id="saveBtn" onclick="handleSave()">📄 スプレッドシートに保存</button>';
      html += '</div>';

      html += '<div class="spreadsheet-link" id="spreadsheetLink"></div>';

      var resultDiv = document.getElementById('result');
      resultDiv.innerHTML = html;
      resultDiv.style.display = 'block';

      bindEditors();
      updateSummary();
    }

    function infoRow(label, key, value, type) {
      var attr = type === 'number' ? ' type="number" step="any"' : ' type="text"';
      var v = value != null ? value : '';
      return '<tr><th>' + esc(label) + '</th><td><input data-field="' + key + '"' + attr + ' value="' + esc(String(v)) + '"></td></tr>';
    }

    function renderLineItemRow(item, idx) {
      var v = function(x) { return x != null ? x : ''; };
      var options = ['<option value=""></option>'];
      for (var c = 65; c <= 90; c++) {
        var ch = String.fromCharCode(c);
        var sel = item.jitsuyo_kigo === ch ? ' selected' : '';
        options.push('<option value="' + ch + '"' + sel + '>' + ch + '</option>');
      }
      return '<tr data-idx="' + idx + '">' +
        '<td class="col-no">' + (idx + 1) + '</td>' +
        '<td><input data-line="delivery_date" type="text" value="' + esc(String(v(item.delivery_date))) + '"></td>' +
        '<td><input data-line="item_name" type="text" value="' + esc(String(v(item.item_name))) + '"></td>' +
        '<td><input data-line="quantity" type="number" step="any" value="' + esc(String(v(item.quantity))) + '"></td>' +
        '<td><input data-line="unit_price" type="number" step="any" value="' + esc(String(v(item.unit_price))) + '"></td>' +
        '<td><select data-line="jitsuyo_kigo">' + options.join('') + '</select></td>' +
        '<td><input data-line="amount" type="number" step="any" value="' + esc(String(v(item.amount))) + '"></td>' +
        '<td class="col-delete"><button class="danger" onclick="removeLineItem(' + idx + ')">削除</button></td>' +
        '</tr>';
    }

    function bindEditors() {
      // 基本情報の変更を currentData に反映
      document.querySelectorAll('[data-field]').forEach(function(el) {
        el.addEventListener('input', function() {
          var key = el.getAttribute('data-field');
          var val = el.value;
          if (el.type === 'number') {
            currentData[key] = val === '' ? null : Number(val);
          } else {
            currentData[key] = val === '' ? null : val;
          }
        });
      });
      // 明細の変更を currentData.line_items に反映 + 集計更新
      var body = document.getElementById('lineItemsBody');
      body.addEventListener('input', onLineItemChange);
      body.addEventListener('change', onLineItemChange);
    }

    function onLineItemChange(e) {
      var el = e.target;
      var key = el.getAttribute('data-line');
      if (!key) return;
      var row = el.closest('tr');
      var idx = Number(row.getAttribute('data-idx'));
      var item = currentData.line_items[idx];
      if (!item) return;
      var val = el.value;
      if (key === 'quantity' || key === 'unit_price' || key === 'amount') {
        item[key] = val === '' ? null : Number(val);
      } else {
        item[key] = val === '' ? null : val;
      }
      if (key === 'amount' || key === 'jitsuyo_kigo') updateSummary();
    }

    function addLineItem() {
      currentData.line_items.push({ delivery_date: null, item_name: '', quantity: null, unit_price: null, jitsuyo_kigo: '', amount: null });
      rerenderLineItems();
    }

    function removeLineItem(idx) {
      currentData.line_items.splice(idx, 1);
      rerenderLineItems();
    }

    function rerenderLineItems() {
      var body = document.getElementById('lineItemsBody');
      body.innerHTML = currentData.line_items.map(function(item, i) { return renderLineItemRow(item, i); }).join('');
      updateSummary();
    }

    function updateSummary() {
      var groups = {};
      (currentData.line_items || []).forEach(function(item) {
        var code = item.jitsuyo_kigo || '(未分類)';
        if (!groups[code]) groups[code] = { total: 0, count: 0 };
        groups[code].total += Number(item.amount) || 0;
        groups[code].count += 1;
      });
      var rows = Object.keys(groups).sort().map(function(code) {
        return '<tr><td>' + esc(code) + '</td><td>' + formatNum(groups[code].total) + '</td><td>' + groups[code].count + '</td></tr>';
      });
      var body = document.getElementById('summaryBody');
      if (body) body.innerHTML = rows.join('') || '<tr><td colspan="3" style="text-align:center;color:#888;">明細なし</td></tr>';
    }

    async function handleSave() {
      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      var originalText = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>保存中...';
      showStatus('<span class="spinner"></span>スプレッドシートに書き込み中...', 'processing');

      try {
        var saveResult = await new Promise(function(resolve, reject) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveToSpreadsheet(currentData, currentFileName);
        });
        showStatus('スプレッドシートへの保存が完了しました。', 'success');
        var linkDiv = document.getElementById('spreadsheetLink');
        linkDiv.innerHTML = '<a href="' + esc(saveResult.spreadsheetUrl) + '" target="_blank">📄 スプレッドシートを開く</a>';
        linkDiv.style.display = 'block';
      } catch (err) {
        showStatus('保存エラー: ' + esc(err.message || String(err)), 'error');
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function formatNum(n) { return n == null || isNaN(n) ? '-' : Number(n).toLocaleString(); }
    function esc(s) { var div = document.createElement('div'); div.textContent = s; return div.innerHTML; }
    function showStatus(msg, type) { var el = document.getElementById('status'); el.innerHTML = msg; el.className = 'status ' + type; }
    function hideStatus() { document.getElementById('status').className = 'status'; document.getElementById('progressWrap').style.display = 'none'; }
  </script>
</body>
</html>
